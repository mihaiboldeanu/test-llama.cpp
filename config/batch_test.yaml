  ctx: 65536
  ctk: q8_0
  ctv: q8_0

- model: Qwen3.6-35B-A3B-UD-Q5_K_XL
  ctx: 65536
  turbo3: true

- model: Qwen3.6-35B-A3B-UD-Q5_K_XL
